# Render Blueprint for the DTCF inference service.
# Uses the SLIM image (Dockerfile.lite): serves the .tflite model with a
# lightweight LiteRT runtime (no full TensorFlow), so it fits Render's free
# 512 MB plan. The model is baked into the image — no HuggingFace/storage setup.
#
# Deploy: push to GitHub, then Render → "New +" → "Blueprint" → pick this repo.
# For a higher-throughput, full-TensorFlow deploy on a ≥2 GB plan, switch
# dockerfilePath to ./Dockerfile and plan to standard. Docs: docs/deploy_render.md
services:
  - type: web
    name: dtcf
    runtime: docker
    dockerfilePath: ./Dockerfile.lite
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Pre-load the model on startup so the first request isn't cold.
      - key: EAGER_LOAD
        value: "1"
      # The TFLite model is baked into the image (LOCAL_MODEL_PATH set in
      # Dockerfile.lite) — no model-source env vars needed.
